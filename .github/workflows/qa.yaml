name: Quality Assurance

on:
  push:

jobs:
  quick-checks:
    name: Quick checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build workspace
        run: cargo build --workspace --all-targets
      - name: Run unit tests
        run: cargo test --workspace --lib
      - name: Build optional streamable-http transport
        run: cargo build -p perplexity-web-api-mcp --all-targets --features streamable-http

  unit-tests:
    name: Unit tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Set up LLVM/libclang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set CMake generator to Ninja (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
      - name: Build workspace (non-Windows)
        if: runner.os != 'Windows'
        run: cargo build --workspace --all-targets
      - name: Run unit tests (non-Windows)
        if: runner.os != 'Windows'
        run: cargo test --workspace --lib
      - name: Build workspace (Windows release)
        if: runner.os == 'Windows'
        run: cargo build --workspace --all-targets --release
      - name: Run unit tests (Windows release)
        if: runner.os == 'Windows'
        run: cargo test --workspace --lib --release
